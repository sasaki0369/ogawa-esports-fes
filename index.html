<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小川eスポーツフェス運営アプリ (OeSF)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B241E;
    --paper:#F6F1E6;
    --card:#FFFFFF;
    --line:#E3D8C4;
    --sub:#8A7B68;
    --burgundy:#7A2E3A;
    --gold:#AD8A4E;
    --forest:#3C5B45;
    --steel:#3A5266;
    --font-display:'Shippori Mincho',serif;
    --font-body:'Noto Sans JP',"Hiragino Sans","Yu Gothic UI",sans-serif;
    --font-mono:'JetBrains Mono',monospace;
    /* 旧カラー変数名のエイリアス(JS側の生成HTMLとの互換用) */
    --hot:var(--burgundy);
    --cool:var(--forest);
    --gold-alias:var(--gold);
    --info:var(--steel);
    --red:var(--burgundy);
    --blue:var(--steel);
    --cyan:var(--forest);
    --navy:var(--ink);
    --amber:var(--gold);
    --green:var(--forest);
    --bg:var(--paper);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--paper);position:relative;}

  header.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#8A3542,var(--burgundy));color:#F3E7CE;padding:14px 20px 15px 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.15);box-shadow:0 2px 6px rgba(43,36,30,.25);position:relative;}
  header.topbar::before{content:"";position:absolute;left:12px;top:8px;bottom:8px;width:2px;background:repeating-linear-gradient(180deg,rgba(243,231,206,.55) 0 3px,transparent 3px 9px);}
  header.topbar h1{font-family:var(--font-display);font-size:19px;line-height:1.3;margin:0;font-weight:700;letter-spacing:.06em;}
  .save-indicator{font-family:var(--font-mono);font-size:10px;opacity:.85;display:flex;align-items:center;gap:6px;letter-spacing:.02em;white-space:nowrap;color:#F3E7CE;}
  .dot{width:7px;height:7px;border-radius:50%;background:#CFE8D2;box-shadow:0 0 0 3px rgba(207,232,210,.25);flex-shrink:0;}

  main{flex:1;padding:20px 16px;padding-bottom:104px;overflow-y:auto;}

  nav.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#EFE6D2;border-top:1px solid var(--line);display:flex;z-index:30;padding-top:6px;box-shadow:0 -2px 8px rgba(43,36,30,.08);}
  nav.tabbar button{flex:1;border:none;background:none;padding:8px 2px 9px;font-family:var(--font-display);font-size:12px;letter-spacing:.02em;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;border-radius:8px 8px 0 0;transition:transform .15s ease;}
  nav.tabbar button:nth-child(1){--tab-color:var(--burgundy);}
  nav.tabbar button:nth-child(2){--tab-color:var(--forest);}
  nav.tabbar button:nth-child(3){--tab-color:var(--steel);}
  nav.tabbar button:nth-child(4){--tab-color:var(--gold);}
  nav.tabbar button:nth-child(5){--tab-color:var(--burgundy);}
  nav.tabbar button:nth-child(6){--tab-color:var(--forest);}
  nav.tabbar button.active{color:#fff;background:var(--tab-color);transform:translateY(-6px);box-shadow:0 -3px 6px rgba(43,36,30,.18);font-weight:700;}
  nav.tabbar button .ic{font-size:16px;}

  .card{background:var(--card);border-radius:8px;padding:18px 18px 18px 22px;margin-bottom:16px;border:1px solid var(--line);box-shadow:0 2px 5px rgba(43,36,30,.06),0 1px 2px rgba(43,36,30,.04);position:relative;}
  .card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;background:var(--gold);border-radius:0 3px 3px 0;}
  .card h2{font-family:var(--font-display);font-size:19px;letter-spacing:.03em;margin:0 0 12px;font-weight:700;color:var(--burgundy);}
  .muted{color:var(--sub);font-size:13px;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .row + .row{margin-top:10px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:6px;padding:13px 14px;font-family:var(--font-display);font-size:15px;letter-spacing:.04em;font-weight:700;cursor:pointer;width:100%;transition:transform .1s ease,opacity .1s ease;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--burgundy);color:#F6F1E6;}
  .btn-danger{background:#96343F;color:#fff;}
  .btn-amber{background:var(--gold);color:#2B241E;}
  .btn-ghost{background:transparent;color:var(--burgundy);border:1.5px solid var(--burgundy);}
  .btn-green{background:var(--forest);color:#fff;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-row{display:flex;gap:8px;}
  input[type=text],input[type=number],input[type=time]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:#FFFDF9;font-family:var(--font-body);}
  select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:#FFFDF9;font-family:var(--font-body);}
  label.field{display:block;font-size:11px;color:var(--sub);margin-bottom:4px;letter-spacing:.04em;font-family:var(--font-mono);}
  .field-group{margin-bottom:12px;}
  .pill{display:inline-block;padding:3px 12px;border-radius:999px;font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.04em;white-space:nowrap;border:1.5px solid currentColor;}
  .pill-active{background:var(--burgundy);color:#fff;border-color:var(--burgundy);}
  .pill-done{background:#EAF1EA;color:var(--forest);}
  .pill-wait{background:#F1EAD9;color:var(--sub);}
  .phase-item{padding:12px 0;border-bottom:1px dotted var(--line);}
  .phase-item:last-child{border-bottom:none;}
  .phase-title{font-family:var(--font-display);font-size:16px;letter-spacing:.02em;font-weight:700;}
  .phase-desc{font-size:12px;color:var(--sub);margin-top:2px;}
  .winners{font-family:var(--font-mono);font-size:12px;color:var(--steel);margin-top:4px;}

  .participant-grid{display:grid;grid-template-columns:56px 1fr;gap:9px 10px;align-items:center;}
  .participant-num{font-family:var(--font-mono);font-weight:700;color:var(--gold);text-align:right;font-size:13px;}

  .match-card{border:1px solid var(--line);border-radius:8px;padding:14px 14px 14px 18px;margin-bottom:12px;background:#fff;box-shadow:0 2px 4px rgba(43,36,30,.05);position:relative;}
  .match-card::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;background:var(--steel);border-radius:0 2px 2px 0;}
  .match-card .mid{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:.02em;color:var(--burgundy);}
  .status-badge{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:.03em;}
  .status-PENDING{background:#F1EAD9;color:var(--sub);}
  .status-IN_PROGRESS{background:var(--burgundy);color:#fff;}
  .status-COMPLETED{background:var(--forest);color:#fff;}
  .plist{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;}
  .ptag{position:relative;background:#FFFDF9;border-radius:6px;padding:6px 12px;font-family:var(--font-mono);font-size:12px;border:1px solid var(--line);box-shadow:0 1px 2px rgba(43,36,30,.06);}
  .ptag::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:6px 0 0 6px;background:var(--gold);}
  .ptag{padding-left:14px;}
  .ranking-result{margin-top:10px;font-size:13px;background:#FBF3DE;border:1px solid var(--gold);border-radius:6px;padding:10px 12px;font-family:var(--font-body);}

  .empty{text-align:center;color:var(--sub);padding:56px 10px;font-family:var(--font-display);font-size:16px;letter-spacing:.02em;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(43,36,30,.55);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
  .modal{background:#FBF7EE;width:100%;max-width:520px;border-radius:18px 18px 0 0;padding:20px;max-height:85vh;overflow-y:auto;border-top:4px solid var(--gold);}
  .modal h3{font-family:var(--font-display);margin:0 0 4px;font-size:18px;letter-spacing:.02em;color:var(--burgundy);}
  .rank-choice{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:6px;padding:13px;margin-top:8px;cursor:pointer;font-family:var(--font-body);font-size:14px;background:#fff;}
  .rank-choice.picked{background:var(--burgundy);color:#fff;border-color:var(--burgundy);}
  .rank-num{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--steel);}
  .rank-choice.picked .rank-num{color:var(--gold);}

  /* Display (big screen) mode */
  #displayView{position:fixed;inset:0;background:var(--burgundy);z-index:200;display:none;flex-direction:column;color:#111;}
  #displayView.show{display:flex;}
  .disp-head{background:linear-gradient(180deg,#8A3542,var(--burgundy));color:#F3E7CE;padding:18px;text-align:center;font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:.06em;border-bottom:1px solid rgba(0,0,0,.2);}
  .disp-body{flex:1;background:var(--paper);overflow-y:auto;padding:20px;}
  .disp-tabs{display:flex;background:var(--burgundy);justify-content:center;gap:10px;padding:12px;}
  .disp-tabs .d{width:9px;height:9px;border-radius:50%;background:rgba(243,231,206,.35);}
  .disp-tabs .d.on{background:var(--gold);}
  .disp-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.2);color:#F3E7CE;border:1px solid rgba(243,231,206,.4);border-radius:6px;padding:6px 12px;font-family:var(--font-mono);font-size:11px;letter-spacing:.03em;}
  .podium-row{display:flex;justify-content:center;align-items:flex-end;gap:14px;margin-top:24px;flex-wrap:wrap;}
  .podium-card{text-align:center;padding:20px 16px;border-radius:8px;background:#fff;border:1px solid var(--line);border-top:4px solid var(--sub);min-width:120px;box-shadow:0 2px 6px rgba(43,36,30,.08);}
  .p1{border-top-color:var(--gold);order:2;padding-top:28px;}
  .p2{border-top-color:#9AA3B2;order:1;}
  .p3{border-top-color:#B0755A;order:3;}
  .medal{font-size:40px;}
  .grid-match{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:420px){ .grid-match.two{grid-template-columns:1fr 1fr;} }
  .next-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 14px 14px 18px;position:relative;box-shadow:0 1px 3px rgba(43,36,30,.06);}
  .next-card::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;background:var(--steel);border-radius:0 2px 2px 0;}
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--ink);color:#F6F1E6;padding:11px 18px;border-radius:8px;font-family:var(--font-body);font-size:13px;letter-spacing:.02em;z-index:300;opacity:0;transition:opacity .25s;}
  .toast.show{opacity:1;}
  a.linklike{color:var(--steel);text-decoration:underline;font-size:12px;}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <h1>小川eスポーツフェス (OeSF)</h1>
    <div class="save-indicator" id="saveIndicator"><span class="dot"></span><span id="saveText">未接続</span></div>
  </header>

  <main id="main"></main>

  <nav class="tabbar">
    <button data-tab="home" class="active"><span class="ic">🏠</span>ホーム</button>
    <button data-tab="participants"><span class="ic">👥</span>参加者</button>
    <button data-tab="tournament"><span class="ic">🎮</span>試合</button>
    <button data-tab="display"><span class="ic">🖥️</span>大型画面</button>
    <button data-tab="history"><span class="ic">🗂️</span>履歴</button>
    <button data-tab="data"><span class="ic">💾</span>データ</button>
  </nav>
</div>

<div id="displayView">
  <button class="disp-close" id="dispClose">閉じる ✕</button>
  <div class="disp-head">小川eスポーツフェス (OeSF)</div>
  <div class="disp-body" id="dispBody"></div>
  <div class="disp-tabs" id="dispTabs">
    <div class="d on"></div><div class="d"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Firebase (modular SDK via CDN) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, onSnapshot,
  collection, addDoc, getDocs, deleteDoc, query, orderBy, limit, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ============================================================
   ▼▼▼ ここに自分のFirebaseプロジェクトの設定を貼り付けてください ▼▼▼
   Firebaseコンソール → プロジェクトの設定 → 全般 → マイアプリ(ウェブ) → SDK設定と構成
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyC_wsGGXYKmsw2nzO9RYlfdp8AxCKOLqkM",
  authDomain: "ogawa-esports-fes.firebaseapp.com",
  projectId: "ogawa-esports-fes",
  storageBucket: "ogawa-esports-fes.firebasestorage.app",
  messagingSenderId: "398891252796",
  appId: "1:398891252796:web:e48ac4d7dcbf8152929739"
};
/* ============================================================ */

let db = null;
let firebaseReady = false;
try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  firebaseReady = firebaseConfig.apiKey !== "YOUR_API_KEY";
} catch (e) {
  console.error("Firebase init error", e);
}

const CURRENT_REF = () => doc(db, "tournaments", "current");
const HISTORY_COL = () => collection(db, "tournaments_history");

/* ============================================================
   状態管理
   ============================================================ */
const defaultState = () => ({
  mode: 32,
  startTime: "",
  phase: "NOT_STARTED", // NOT_STARTED, PRELIMINARY, LOSERS_REVIVAL, MAIN_ROUND, SEMI_FINAL, FINAL, CEREMONY, COMPLETED
  participants: [], // {number, name}
  matches: [], // {id, roundType, roundNumber, screenId, participants:[num], status, rankings:[num]}
  champion: null,
  updatedAtLocal: null
});

let state = defaultState();
let currentTab = "home";
let lastSavedAt = null;
let saveTimer = null;
let unsubscribeCurrent = null;

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

const PHASE_LABEL = {
  NOT_STARTED: "まもなく開始",
  PRELIMINARY: "予選",
  LOSERS_REVIVAL: "敗者復活",
  MAIN_ROUND: "本選",
  SEMI_FINAL: "準決勝",
  FINAL: "決勝",
  CEREMONY: "表彰式",
  COMPLETED: "完了"
};
const ROUND_FOR_PHASE = {
  PRELIMINARY: "PRELIMINARY",
  LOSERS_REVIVAL: "LOSERS_REVIVAL",
  MAIN_ROUND: "MAIN_ROUND",
  SEMI_FINAL: "SEMI_FINAL",
  FINAL: "GRAND_FINAL"
};

function letterFor(i){ return String.fromCharCode(65+i); }

function participantByNumber(n){
  return state.participants.find(p => p.number === n);
}
function pname(n){
  const p = participantByNumber(n);
  return (p && p.name) ? p.name : "";
}

/* ============================================================
   大会進行ロジック（元Androidアプリのエンジンを移植）
   ============================================================ */
function initializeParticipants(){
  state.participants = Array.from({length:50}, (_,i)=>({number:i+1, name:""}));
}
function clearParticipantNames(){
  state.participants = state.participants.map(p=>({...p, name:""}));
}
function loadParticipantsFromCsv(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const parsed = [];
  for (const line of lines) {
    const parts = line.split(",");
    if (parts.length >= 2) {
      const number = parseInt(parts[0].trim(), 10);
      const name = parts[1].trim();
      if (!isNaN(number) && number >= 1 && number <= 50) parsed.push({number, name});
    }
  }
  const existing = [...state.participants];
  for (const p of parsed) {
    const idx = existing.findIndex(e => e.number === p.number);
    if (idx >= 0) existing[idx] = p; else existing.push(p);
  }
  existing.sort((a,b)=>a.number-b.number);
  state.participants = existing;
}

function shuffled(arr){
  const a = [...arr];
  for (let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startTournament(){
  generateMatches(state.mode);
}

function generateMatches(mode){
  if (state.participants.length === 0) { toast("参加者を登録してください"); return; }
  const count = [32,24,16].includes(mode) ? mode : null;
  if (!count) return;
  const shuf = shuffled(state.participants);
  const selected = shuf.slice(0, count).sort((a,b)=>a.number-b.number);
  const groupCount = count/4;
  const matches = [];
  for (let i=0;i<groupCount;i++){
    const grp = selected.slice(i*4, i*4+4).map(p=>p.number);
    matches.push({
      id: `予選R${i+1}`,
      roundType: "PRELIMINARY",
      roundNumber: i+1,
      screenId: `予選R1-${letterFor(i)}`,
      participants: grp,
      status: "PENDING",
      rankings: []
    });
  }
  state.matches = matches;
  state.phase = "PRELIMINARY";
  persist();
}

function startMatch(matchId){
  state.matches = state.matches.map(m => (m.id===matchId && m.status==="PENDING") ? {...m, status:"IN_PROGRESS"} : m);
  persist();
}

function recordMatchResult(matchId, rankings){
  state.matches = state.matches.map(m => m.id===matchId ? {...m, status:"COMPLETED", rankings} : m);
  checkAndProgressPhase();
  persist();
}

function checkAndProgressPhase(){
  const roundType = ROUND_FOR_PHASE[state.phase];
  if (!roundType) return;
  const phaseMatches = state.matches.filter(m => m.roundType === roundType);
  if (phaseMatches.length > 0 && phaseMatches.every(m => m.status === "COMPLETED")) {
    if (state.phase === "PRELIMINARY") generateLosersRevivalMatches();
    else if (state.phase === "LOSERS_REVIVAL") generateMainRoundMatches();
    else if (state.phase === "MAIN_ROUND") generateSemiFinalMatches();
    else if (state.phase === "SEMI_FINAL") generateGrandFinal();
    else if (state.phase === "FINAL") completeTournament();
  }
}

function generateLosersRevivalMatches(){
  const prelim = state.matches.filter(m=>m.roundType==="PRELIMINARY");
  const losers = prelim.flatMap(m => m.rankings.slice(2));
  const chunks = chunk(losers, 4);
  const newMatches = chunks.map((grp, i) => ({
    id: `敗者復活R${i+1}`,
    roundType: "LOSERS_REVIVAL",
    roundNumber: i+1,
    screenId: `敗者復活R1-${letterFor(i)}`,
    participants: grp,
    status: "PENDING",
    rankings: []
  }));
  state.matches = [...state.matches, ...newMatches];
  state.phase = "LOSERS_REVIVAL";
}

function generateMainRoundMatches(){
  const prelim = state.matches.filter(m=>m.roundType==="PRELIMINARY");
  const winners = prelim.flatMap(m=>m.rankings.slice(0,2));
  const revival = state.matches.filter(m=>m.roundType==="LOSERS_REVIVAL");
  const revivalWinners = revival.flatMap(m=>m.rankings.slice(0,2));
  const all = shuffled([...winners, ...revivalWinners]);
  const chunks = chunk(all, 4);
  const newMatches = chunks.map((grp,i)=>({
    id: `本選R${i+1}`,
    roundType: "MAIN_ROUND",
    roundNumber: i+1,
    screenId: `本選R1-${letterFor(i)}`,
    participants: grp,
    status: "PENDING",
    rankings: []
  }));
  state.matches = [...state.matches, ...newMatches];
  state.phase = "MAIN_ROUND";
}

function generateSemiFinalMatches(){
  const main = state.matches.filter(m=>m.roundType==="MAIN_ROUND");
  const winners = main.flatMap(m=>m.rankings.slice(0,2));
  const chunks = chunk(winners, 4);
  const newMatches = chunks.map((grp,i)=>({
    id: `準決勝R${i+1}`,
    roundType: "SEMI_FINAL",
    roundNumber: i+1,
    screenId: `準決勝R1-${letterFor(i)}`,
    participants: grp,
    status: "PENDING",
    rankings: []
  }));
  state.matches = [...state.matches, ...newMatches];
  state.phase = "SEMI_FINAL";
}

function generateGrandFinal(){
  const semi = state.matches.filter(m=>m.roundType==="SEMI_FINAL");
  const winners = semi.flatMap(m=>m.rankings.slice(0,2));
  const grandFinal = {
    id: "決勝",
    roundType: "GRAND_FINAL",
    roundNumber: 1,
    screenId: "決勝",
    participants: winners,
    status: "PENDING",
    rankings: []
  };
  state.matches = [...state.matches, grandFinal];
  state.phase = "FINAL";
}

function completeTournament(){
  const gf = state.matches.find(m=>m.roundType==="GRAND_FINAL");
  if (gf && gf.rankings.length > 0) {
    state.champion = gf.rankings[0];
    state.phase = "CEREMONY";
    saveTournamentToHistory();
  }
}

function chunk(arr, size){
  const out = [];
  for (let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size));
  return out;
}

function clearTournamentData(){
  state.phase = "NOT_STARTED";
  state.matches = [];
  state.champion = null;
  persist();
}

function startNewTournament(){
  state = defaultState();
  persist();
}

/* ============================================================
   Firestore 永続化・同期
   ============================================================ */
function persist(){
  render();
  if (!firebaseReady) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try {
      await setDoc(CURRENT_REF(), {
        mode: state.mode,
        startTime: state.startTime,
        phase: state.phase,
        participants: state.participants,
        matches: state.matches,
        champion: state.champion,
        updatedAt: serverTimestamp()
      });
      lastSavedAt = new Date();
      updateSaveIndicator(true);
    } catch(e){
      console.error(e);
      updateSaveIndicator(false, true);
    }
  }, 350);
}

async function saveTournamentToHistory(){
  if (!firebaseReady) return;
  try {
    await addDoc(HISTORY_COL(), {
      mode: state.mode,
      phase: state.phase,
      participants: state.participants,
      matches: state.matches,
      champion: state.champion,
      startTime: state.startTime,
      savedAt: serverTimestamp()
    });
  } catch(e){ console.error(e); }
}

async function loadHistoryList(){
  if (!firebaseReady) return [];
  try {
    const q = query(HISTORY_COL(), orderBy("savedAt","desc"), limit(10));
    const snap = await getDocs(q);
    return snap.docs.map(d=>({id:d.id, ...d.data()}));
  } catch(e){ console.error(e); return []; }
}

async function deleteHistoryItem(id){
  if (!firebaseReady) return;
  try { await deleteDoc(doc(db,"tournaments_history", id)); } catch(e){ console.error(e); }
}

function loadHistoryIntoState(item){
  state.mode = item.mode || 32;
  state.startTime = item.startTime || "";
  state.phase = item.phase;
  state.participants = item.participants || [];
  state.matches = item.matches || [];
  state.champion = item.champion || null;
  persist();
  toast("大会を読み込みました");
  switchTab("home");
}

function updateSaveIndicator(ok, error){
  const el = document.getElementById("saveText");
  const dot = document.querySelector("#saveIndicator .dot");
  if (!firebaseReady) {
    el.textContent = "未接続(設定要)";
    dot.style.background = "#B0BEC5";
    return;
  }
  if (error) {
    el.textContent = "保存エラー";
    dot.style.background = "#FF5252";
    return;
  }
  if (ok && lastSavedAt) {
    const hh = String(lastSavedAt.getHours()).padStart(2,"0");
    const mm = String(lastSavedAt.getMinutes()).padStart(2,"0");
    const ss = String(lastSavedAt.getSeconds()).padStart(2,"0");
    el.textContent = `同期済 ${hh}:${mm}:${ss}`;
    dot.style.background = "#69F0AE";
  }
}

function subscribeRealtime(){
  if (!firebaseReady) { updateSaveIndicator(false); return; }
  unsubscribeCurrent = onSnapshot(CURRENT_REF(), (snap)=>{
    if (snap.exists()) {
      const d = snap.data();
      state.mode = d.mode ?? state.mode;
      state.startTime = d.startTime ?? state.startTime;
      state.phase = d.phase ?? state.phase;
      state.participants = d.participants ?? state.participants;
      state.matches = d.matches ?? state.matches;
      state.champion = d.champion ?? state.champion;
      lastSavedAt = new Date();
      updateSaveIndicator(true);
      render();
    }
  }, (err)=>{ console.error(err); updateSaveIndicator(false, true); });
}

/* ============================================================
   データ管理（エクスポート/インポート/クリア）
   ============================================================ */
async function exportData(){
  const history = await loadHistoryList();
  const payload = { current: state, history, exportTime: Date.now() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date();
  const fname = `OgawaEsports_${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,"0")}${String(ts.getDate()).padStart(2,"0")}_${String(ts.getHours()).padStart(2,"0")}${String(ts.getMinutes()).padStart(2,"0")}${String(ts.getSeconds()).padStart(2,"0")}.json`;
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
  toast("データをエクスポートしました");
}

function importData(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.current) {
        state.mode = data.current.mode ?? state.mode;
        state.startTime = data.current.startTime ?? state.startTime;
        state.phase = data.current.phase ?? state.phase;
        state.participants = data.current.participants ?? state.participants;
        state.matches = data.current.matches ?? state.matches;
        state.champion = data.current.champion ?? state.champion;
        persist();
      }
      toast("データをインポートしました");
    } catch(err){
      console.error(err);
      toast("インポートに失敗しました");
    }
  };
  reader.readAsText(file);
}

async function clearAllData(){
  if (firebaseReady) {
    try {
      const snap = await getDocs(HISTORY_COL());
      for (const d of snap.docs) await deleteDoc(d.ref);
    } catch(e){ console.error(e); }
  }
  startNewTournament();
  toast("すべてのデータを削除しました");
}

/* ============================================================

   ============================================================ */
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll("nav.tabbar button").forEach(b=>{
    b.classList.toggle("active", b.dataset.tab === tab);
  });
  render();
}

function render(){
  if (currentTab === "home") renderHome();
  else if (currentTab === "participants") renderParticipants();
  else if (currentTab === "tournament") renderTournament();
  else if (currentTab === "history") renderHistory();
  else if (currentTab === "data") renderData();
  else if (currentTab === "display") { switchTab("home"); openDisplay(); }
  updateSaveIndicator(!!lastSavedAt);
}

function el(html){
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}

function phaseItemHtml(title, desc, roundType, winners){
  const matches = state.matches.filter(m=>m.roundType===roundType);
  const isActive = ROUND_FOR_PHASE[state.phase] === roundType;
  const isCompleted = matches.length>0 && matches.every(m=>m.status==="COMPLETED");
  const status = isActive ? '進行中' : (isCompleted ? '完了' : '待機中');
  const cls = isActive ? 'pill-active' : (isCompleted ? 'pill-done' : 'pill-wait');
  return `
    <div class="phase-item">
      <div class="row">
        <div>
          <div class="phase-title">${title}</div>
          <div class="phase-desc">${desc}</div>
        </div>
        <span class="pill ${cls}">${status}</span>
      </div>
      ${winners && winners.length ? `<div class="winners">通過: ${winners.join(", ")}</div>` : ''}
    </div>
  `;
}

function phaseCaption(){
  const mode = state.mode;
  const groupCount = mode/4;
  switch(state.phase){
    case "PRELIMINARY": return `${groupCount}試合（4人×${groupCount}）｜上位2名が勝者`;
    case "LOSERS_REVIVAL": {
      const c = state.matches.filter(m=>m.roundType==="LOSERS_REVIVAL").length;
      return `${c}試合｜上位2名が復活`;
    }
    case "MAIN_ROUND": {
      const c = state.matches.filter(m=>m.roundType==="MAIN_ROUND").length;
      return `${c}試合｜上位2名が通過`;
    }
    case "SEMI_FINAL": {
      const c = state.matches.filter(m=>m.roundType==="SEMI_FINAL").length;
      return `${c}試合｜上位2名が決勝進出`;
    }
    case "FINAL": return `決勝戦`;
    default: return "";
  }
}

function renderTournament(){
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="card">
      <div class="row"><h2 style="margin:0;">試合進行</h2><span class="pill pill-active">${PHASE_LABEL[state.phase]}</span></div>
      <div class="muted" style="margin-top:6px;">${phaseCaption()}</div>
    </div>
    <div id="matchList"></div>
  `;
  const list = document.getElementById("matchList");
  if (state.matches.length === 0) {
    list.innerHTML = `<div class="empty">大会を開始すると試合が表示されます</div>`;
    return;
  }
  // 現在フェーズの試合を先頭に
  const roundType = ROUND_FOR_PHASE[state.phase];
  const sorted = [...state.matches].sort((a,b)=>{
    const aCur = a.roundType===roundType ? 0 : 1;
    const bCur = b.roundType===roundType ? 0 : 1;
    return aCur - bCur;
  });
  sorted.forEach(m => list.appendChild(renderMatchCard(m)));
}

function renderMatchCard(match){
  const card = el(`<div class="match-card"></div>`);
  const nameList = match.participants.map(n=>{
    const nm = pname(n);
    return `<span class="ptag">No.${n}${nm?" "+nm:""}</span>`;
  }).join("");
  card.innerHTML = `
    <div class="row">
      <span class="mid">${match.id}</span>
      <span class="status-badge status-${match.status}">${match.status==='PENDING'?'待機中':match.status==='IN_PROGRESS'?'進行中':'完了'}</span>
    </div>
    <div class="plist">${nameList}</div>
  `;
  if (match.status === "PENDING") {
    const btn = el(`<button class="btn btn-primary" style="margin-top:10px;">試合開始</button>`);
    btn.onclick = () => startMatch(match.id);
    card.appendChild(btn);
  } else if (match.status === "IN_PROGRESS") {
    const btn = el(`<button class="btn btn-amber" style="margin-top:10px;">順位を入力</button>`);
    btn.onclick = () => openRankingModal(match);
    card.appendChild(btn);
  } else if (match.status === "COMPLETED") {
    const resultHtml = match.rankings.map((n,i)=>`${i+1}位: No.${n} ${pname(n)}`).join("<br>");
    card.appendChild(el(`<div class="ranking-result">${resultHtml}</div>`));
  }
  return card;
}

function openRankingModal(match){
  let rankings = [];
  const backdrop = el(`<div class="modal-backdrop"></div>`);
  const modal = el(`<div class="modal"></div>`);
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };

  function draw(){
    modal.innerHTML = `<h3>${match.id} - 順位を入力</h3><div class="muted">上位から順にタップしてください</div>`;
    rankings.forEach((n, idx) => {
      const div = el(`<div class="rank-choice picked"><span>No.${n} ${pname(n)}</span><span class="rank-num">${idx+1}位</span></div>`);
      modal.appendChild(div);
    });
    const remaining = match.participants.filter(n => !rankings.includes(n));
    if (remaining.length) {
      const divider = el(`<div class="muted" style="margin-top:10px;">未決定</div>`);
      modal.appendChild(divider);
    }
    remaining.forEach(n => {
      const div = el(`<div class="rank-choice"><span>No.${n} ${pname(n)}</span></div>`);
      div.onclick = () => { rankings = [...rankings, n]; draw(); };
      modal.appendChild(div);
    });
    if (rankings.length) {
      const resetBtn = el(`<button class="btn btn-ghost" style="margin-top:12px;">順位をリセット</button>`);
      resetBtn.onclick = () => { rankings = []; draw(); };
      modal.appendChild(resetBtn);
    }
    const confirmBtn = el(`<button class="btn btn-primary" style="margin-top:10px;">確定</button>`);
    confirmBtn.disabled = rankings.length !== match.participants.length;
    confirmBtn.onclick = () => {
      recordMatchResult(match.id, rankings);
      backdrop.remove();
      render();
    };
    modal.appendChild(confirmBtn);
    const cancelBtn = el(`<button class="btn btn-ghost" style="margin-top:8px;">キャンセル</button>`);
    cancelBtn.onclick = () => backdrop.remove();
    modal.appendChild(cancelBtn);
  }
  draw();
}

    const card = el(`<div class="card"></div>`);

/* ============================================================
   大型画面（表示専用モード）
   ============================================================ */
let dispPage = 0;
function openDisplay(){
  document.getElementById("displayView").classList.add("show");
  dispPage = 0;
  renderDisplay();
}
function closeDisplay(){
  document.getElementById("displayView").classList.remove("show");
}
document.getElementById("dispClose").onclick = closeDisplay;
document.getElementById("dispTabs").addEventListener("click", (e)=>{
  const idx = Array.from(e.currentTarget.children).indexOf(e.target);
  if (idx >= 0) { dispPage = idx; renderDisplay(); }
});

function renderDisplay(){
  const body = document.getElementById("dispBody");
  const dots = document.querySelectorAll("#dispTabs .d");
  dots.forEach((d,i)=>d.classList.toggle("on", i===dispPage));

  if (dispPage === 0) {
    const current = state.matches.filter(m=>m.status==="IN_PROGRESS");
    const next = state.matches.filter(m=>m.status==="PENDING").slice(0,2);
    const gf = state.matches.find(m=>m.roundType==="GRAND_FINAL"&&m.status==="COMPLETED");
    const topThree = gf ? gf.rankings.slice(0,3) : [];

    if (current.length > 0) {
      body.innerHTML = `<div style="font-size:20px;font-weight:800;color:var(--red);margin-bottom:10px;">現在の試合（${current.length}試合）</div>
        <div class="grid-match ${current.length>1?'two':''}"></div>`;
      const grid = body.querySelector(".grid-match");
      current.slice(0,2).forEach(m => {
        const c = el(`<div class="match-card"></div>`);
        c.innerHTML = `<div class="mid" style="font-size:18px;">${m.id}</div><div class="plist">${m.participants.map(n=>`<span class="ptag" style="font-size:14px;">No.${n} ${pname(n)}</span>`).join("")}</div>`;
        grid.appendChild(c);
      });
    } else if (state.champion !== null && topThree.length === 3) {
      body.innerHTML = `<div style="text-align:center;font-size:28px;font-weight:800;color:var(--red);">🏆 表彰台 🏆</div>`;
      const row = el(`<div class="podium-row"></div>`);
      const medals = ["🥇","🥈","🥉"];
      const order = [1,0,2]; // 2位,1位,3位の順で表示
      order.forEach(i => {
        const num = topThree[i];
        const div = el(`<div class="podium-card p${i+1}"><div class="medal">${medals[i]}</div><div style="font-weight:800;font-size:20px;">${pname(num)||('No.'+num)}</div><div class="muted">No.${num}</div></div>`);
        row.appendChild(div);
      });
      body.innerHTML = ""; 
      body.appendChild(el(`<div style="text-align:center;font-size:28px;font-weight:800;color:var(--red);">🏆 表彰台 🏆</div>`));
      body.appendChild(row);
    } else if (next.length > 0) {
      body.innerHTML = `<div style="font-size:20px;font-weight:800;color:var(--cyan);margin-bottom:10px;">次の対戦</div>`;
      next.forEach(m => {
        const c = el(`<div class="next-card" style="margin-bottom:10px;"></div>`);
        c.innerHTML = `<div style="font-weight:700;">${m.id}</div><div class="plist">${m.participants.map(n=>`<span class="ptag">No.${n} ${pname(n)}</span>`).join("")}</div>`;
        body.appendChild(c);
      });
    } else {
      body.innerHTML = `<div class="empty">大会開始をお待ちください</div>`;
    }
  } else {
    const total = state.matches.length;
    const completed = state.matches.filter(m=>m.status==="COMPLETED").length;
    const inProgress = state.matches.filter(m=>m.status==="IN_PROGRESS").length;
    const pending = state.matches.filter(m=>m.status==="PENDING").slice(0,8);
    body.innerHTML = `
      <div style="font-size:24px;font-weight:800;color:var(--blue);margin-bottom:12px;">大会進行状況</div>
      <div class="card">
        <div class="row"><span class="muted">現在のフェーズ</span><span style="font-weight:800;color:var(--red);">${PHASE_LABEL[state.phase]}</span></div>
        <div class="row"><span class="muted">試合進捗</span><span style="font-weight:800;">${completed} / ${total} 完了</span></div>
        ${inProgress>0?`<div class="row"><span class="muted">進行中</span><span style="font-weight:800;color:var(--blue);">${inProgress}試合</span></div>`:''}
      </div>
      <div style="font-size:20px;font-weight:800;color:var(--cyan);margin:16px 0 8px;">次の対戦予定</div>
      <div class="grid-match two"></div>
    `;
    const grid = body.querySelector(".grid-match");
    if (pending.length === 0) {
      grid.outerHTML = `<div class="empty">待機中の試合はありません</div>`;
    } else {
      pending.forEach(m=>{
        const c = el(`<div class="next-card"></div>`);
        c.innerHTML = `<div style="font-weight:700;color:var(--cyan);">${m.id}</div><div class="plist">${m.participants.map(n=>`<span class="ptag">No.${n} ${pname(n)}</span>`).join("")}</div>`;
        grid.appendChild(c);
      });
    }
  }
}

// state更新のたびに大型画面も更新
const _origRender = render;
render = function(){ _origRender(); if (document.getElementById("displayView").classList.contains("show")) renderDisplay(); };

/* ============================================================
   初期化
   ============================================================ */
document.querySelectorAll("nav.tabbar button").forEach(btn => {
  btn.addEventListener("click", () => switchTab(btn.dataset.tab));
});

subscribeRealtime();
render();
</script>
</body>
</html>
