</style>

<!-- Firebase (modular SDK via CDN) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, onSnapshot,
  collection, addDoc, getDocs, deleteDoc, query, orderBy, limit, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ============================================================
   ▼▼▼ ここに自分のFirebaseプロジェクトの設定を貼り付けてください ▼▼▼
   Firebaseコンソール → プロジェクトの設定 → 全般 → マイアプリ(ウェブ) → SDK設定と構成
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyC_wsGGXYKmsw2nzO9RYlfdp8AxCKOLqkM",
  authDomain: "ogawa-esports-fes.firebaseapp.com",
  projectId: "ogawa-esports-fes",
  storageBucket: "ogawa-esports-fes.firebasestorage.app",
  messagingSenderId: "398891252796",
  appId: "1:398891252796:web:e48ac4d7dcbf8152929739"
};
/* ============================================================ */

let db = null;
let firebaseReady = false;
try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  firebaseReady = firebaseConfig.apiKey !== "YOUR_API_KEY";
} catch (e) {
  console.error("Firebase init error", e);
}

const CURRENT_REF = () => doc(db, "tournaments", "current");
const HISTORY_COL = () => collection(db, "tournaments_history");

/* ============================================================
   状態管理
   ============================================================ */
const defaultState = () => ({
  mode: 32,
  startTime: "",
  phase: "NOT_STARTED", // NOT_STARTED, PRELIMINARY, LOSERS_REVIVAL, MAIN_ROUND, SEMI_FINAL, FINAL, CEREMONY, COMPLETED
  participants: [], // {number, name}
  matches: [], // {id, roundType, roundNumber, screenId, participants:[num], status, rankings:[num]}
  champion: null,
  updatedAtLocal: null
});

let state = defaultState();
let currentTab = "home";
let lastSavedAt = null;
let saveTimer = null;
let unsubscribeCurrent = null;

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

const PHASE_LABEL = {
  NOT_STARTED: "まもなく開始",
  PRELIMINARY: "予選",
  LOSERS_REVIVAL: "敗者復活",
  MAIN_ROUND: "本選",
  SEMI_FINAL: "準決勝",
  FINAL: "決勝",
  CEREMONY: "表彰式",
  COMPLETED: "完了"
};
const ROUND_FOR_PHASE = {
  PRELIMINARY: "PRELIMINARY",
  LOSERS_REVIVAL: "LOSERS_REVIVAL",
  MAIN_ROUND: "MAIN_ROUND",
  SEMI_FINAL: "SEMI_FINAL",
  FINAL: "GRAND_FINAL"
};

function letterFor(i){ return String.fromCharCode(65+i); }

function participantByNumber(n){
  return state.participants.find(p => p.number === n);
}
function pname(n){
  const p = participantByNumber(n);
  return (p && p.name) ? p.name : "";
}

/* ============================================================
   大会進行ロジック（元Androidアプリのエンジンを移植）
   ============================================================ */
function initializeParticipants(){
  state.participants = Array.from({length:50}, (_,i)=>({number:i+1, name:""}));
}
function clearParticipantNames(){
  state.participants = state.participants.map(p=>({...p, name:""}));
}
function loadParticipantsFromCsv(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const parsed = [];
  for (const line of lines) {
    const parts = line.split(",");
    if (parts.length >= 2) {
      const number = parseInt(parts[0].trim(), 10);
      const name = parts[1].trim();
      if (!isNaN(number) && number >= 1 && number <= 50) parsed.push({number, name});
    }
  }
  const existing = [...state.participants];
  for (const p of parsed) {
    const idx = existing.findIndex(e => e.number === p.number);
    if (idx >= 0) existing[idx] = p; else existing.push(p);
  }
  existing.sort((a,b)=>a.number-b.number);
  state.participants = existing;
}

function shuffled(arr){
  const a = [...arr];
  for (let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startTournament(){
  generateMatches(state.mode);
}

function pairKey(a,b){ return a<b ? a+","+b : b+","+a; }

function buildPairHistorySet(){
  const set = new Set();
  state.matches.forEach(m=>{
    const ps = m.participants;
    for(let i=0;i<ps.length;i++){
      for(let j=i+1;j<ps.length;j++) set.add(pairKey(ps[i],ps[j]));
    }
  });
  return set;
}

function scoreGrouping(groups, historySet){
  let score = 0;
  groups.forEach(g=>{
    for(let i=0;i<g.length;i++){
      for(let j=i+1;j<g.length;j++){
        if (historySet.has(pairKey(g[i],g[j]))) score++;
      }
    }
  });
  return score;
}

// 敗者戦も含め、既に対戦したことがある組み合わせをできるだけ避けてグループ分けする
function groupMinimizingRematches(numbers, groupSize, historySet){
  let best = chunk(shuffled(numbers), groupSize);
  let bestScore = scoreGrouping(best, historySet);
  const attempts = numbers.length <= 16 ? 400 : 150;
  for (let a=0; a<attempts && bestScore>0; a++){
    const groups = chunk(shuffled(numbers), groupSize);
    const score = scoreGrouping(groups, historySet);
    if (score < bestScore){ bestScore = score; best = groups; }
  }
  return best;
}

function generateMatches(mode){
  if (state.participants.length === 0) { toast("参加者を登録してください"); return; }
  const count = [32,24,16].includes(mode) ? mode : null;
  if (!count) return;
  const shuf = shuffled(state.participants);
  const selected = shuf.slice(0, count).map(p=>p.number);
  const historySet = buildPairHistorySet();
  const groups = groupMinimizingRematches(selected, 4, historySet);
  const matches = groups.map((grp, i) => ({
    id: `予選R${i+1}`,
    roundType: "PRELIMINARY",
    roundNumber: i+1,
    screenId: `予選R1-${letterFor(i)}`,
    participants: grp,
    status: "PENDING",
    rankings: []
  }));
  state.matches = matches;
  state.phase = "PRELIMINARY";
  persist();
}

function startMatch(matchId){
  state.matches = state.matches.map(m => (m.id===matchId && m.status==="PENDING") ? {...m, status:"IN_PROGRESS"} : m);
  persist();
}

function recordMatchResult(matchId, rankings){
  state.matches = state.matches.map(m => m.id===matchId ? {...m, status:"COMPLETED", rankings} : m);
  persist();
}

// 現在のフェーズの試合がすべて完了し、次のステージへ進めるかどうか
function isPhaseReadyToAdvance(){
  const roundType = ROUND_FOR_PHASE[state.phase];
  if (!roundType) return false;
  const phaseMatches = state.matches.filter(m => m.roundType === roundType);
  return phaseMatches.length > 0 && phaseMatches.every(m => m.status === "COMPLETED");
}

const NEXT_STAGE_LABEL = {
  PRELIMINARY: "敗者復活ステージへ進む",
  LOSERS_REVIVAL: "本選ステージへ進む",
  MAIN_ROUND: "準決勝ステージへ進む",
  SEMI_FINAL: "決勝ステージへ進む",
  FINAL: "結果を確定する"
};

function advanceToNextPhase(){
  if (!isPhaseReadyToAdvance()) return;
  if (state.phase === "PRELIMINARY") generateLosersRevivalMatches();
  else if (state.phase === "LOSERS_REVIVAL") generateMainRoundMatches();
  else if (state.phase === "MAIN_ROUND") generateSemiFinalMatches();
  else if (state.phase === "SEMI_FINAL") generateGrandFinal();
  else if (state.phase === "FINAL") completeTournament();
  persist();
}

function generateLosersRevivalMatches(){
  const prelim = state.matches.filter(m=>m.roundType==="PRELIMINARY");
  const losers = prelim.flatMap(m => m.rankings.slice(2));
  const historySet = buildPairHistorySet();
  const groups = groupMinimizingRematches(losers, 4, historySet);
  const newMatches = groups.map((grp, i) => ({
    id: `敗者復活R${i+1}`,
    roundType: "LOSERS_REVIVAL",
    roundNumber: i+1,
    screenId: `敗者復活R1-${letterFor(i)}`,
    participants: grp,
    status: "PENDING",
    rankings: []
  }));
  state.matches = [...state.matches, ...newMatches];
  state.phase = "LOSERS_REVIVAL";
}

function generateMainRoundMatches(){
  const prelim = state.matches.filter(m=>m.roundType==="PRELIMINARY");
  const winners = prelim.flatMap(m=>m.rankings.slice(0,2));
  const revival = state.matches.filter(m=>m.roundType==="LOSERS_REVIVAL");
  const revivalWinners = revival.flatMap(m=>m.rankings.slice(0,2));
  const all = [...winners, ...revivalWinners];
  const historySet = buildPairHistorySet();
  const groups = groupMinimizingRematches(all, 4, historySet);
  const newMatches = groups.map((grp,i)=>({
    id: `本選R${i+1}`,
    roundType: "MAIN_ROUND",
    roundNumber: i+1,
    screenId: `本選R1-${letterFor(i)}`,
    participants: grp,
    status: "PENDING",
    rankings: []
  }));
  state.matches = [...state.matches, ...newMatches];
  state.phase = "MAIN_ROUND";
}

function generateSemiFinalMatches(){
  const main = state.matches.filter(m=>m.roundType==="MAIN_ROUND");
  const winners = main.flatMap(m=>m.rankings.slice(0,2));
  const historySet = buildPairHistorySet();
  const groups = groupMinimizingRematches(winners, 4, historySet);
  const newMatches = groups.map((grp,i)=>({
    id: `準決勝R${i+1}`,
    roundType: "SEMI_FINAL",
    roundNumber: i+1,
    screenId: `準決勝R1-${letterFor(i)}`,
    participants: grp,
    status: "PENDING",
    rankings: []
  }));
  state.matches = [...state.matches, ...newMatches];
  state.phase = "SEMI_FINAL";
}

function generateGrandFinal(){
  const semi = state.matches.filter(m=>m.roundType==="SEMI_FINAL");
  const winners = semi.flatMap(m=>m.rankings.slice(0,2));
  const grandFinal = {
    id: "決勝",
    roundType: "GRAND_FINAL",
    roundNumber: 1,
    screenId: "決勝",
    participants: shuffled(winners),
    status: "PENDING",
    rankings: []
  };
  state.matches = [...state.matches, grandFinal];
  state.phase = "FINAL";
}

function completeTournament(){
  const gf = state.matches.find(m=>m.roundType==="GRAND_FINAL");
  if (gf && gf.rankings.length > 0) {
    state.champion = gf.rankings[0];
    state.phase = "CEREMONY";
    saveTournamentToHistory();
  }
}

function chunk(arr, size){
  const out = [];
  for (let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size));
  return out;
}

// 参加者ごとの戦績記号(○:勝ち ×:負け △:復活 ◎:優勝)と現在ステータスを算出
function computeParticipantRecord(number){
  const relevant = state.matches.filter(m => m.participants.includes(number) && m.status === "COMPLETED");
  if (relevant.length === 0) return { symbols: [], status: null };
  const symbols = relevant.map(m=>{
    const rank = m.rankings.indexOf(number);
    if (m.roundType === "GRAND_FINAL") return rank === 0 ? "◎" : "×";
    if (m.roundType === "LOSERS_REVIVAL") return rank < 2 ? "△" : "×";
    return rank < 2 ? "○" : "×";
  });
  let status;
  if (state.champion === number) {
    status = "優勝";
  } else {
    const lastMatch = relevant[relevant.length - 1];
    const lastRank = lastMatch.rankings.indexOf(number);
    const lastWon = lastMatch.roundType === "GRAND_FINAL" ? lastRank === 0 : lastRank < 2;
    if (!lastWon && lastMatch.roundType !== "PRELIMINARY") {
      status = "敗退";
    } else if (!lastWon && lastMatch.roundType === "PRELIMINARY") {
      const revivalGenerated = state.matches.some(m=>m.roundType==="LOSERS_REVIVAL");
      const inRevival = state.matches.some(m=>m.roundType==="LOSERS_REVIVAL" && m.participants.includes(number));
      status = (revivalGenerated && !inRevival) ? "敗退" : "勝ち上がり中";
    } else {
      status = "勝ち上がり中";
    }
  }
  return { symbols, status };
}

function computeStatusCounts(){
  let winners=0, losers=0, revived=0;
  state.participants.forEach(p=>{
    const rec = computeParticipantRecord(p.number);
    if (!rec.status) return;
    if (rec.status === "勝ち上がり中" || rec.status === "優勝") winners++;
    else if (rec.status === "敗退") losers++;
    if (rec.symbols.includes("△")) revived++;
  });
  const finalists = state.matches.filter(m=>m.roundType==="GRAND_FINAL").reduce((acc,m)=>acc+m.participants.length,0);
  return { winners, losers, revived, finalists };
}

function clearTournamentData(){
  state.phase = "NOT_STARTED";
  state.matches = [];
  state.champion = null;
  persist();
}

function startNewTournament(){
  state = defaultState();
  persist();
}

/* ============================================================
   Firestore 永続化・同期
   ============================================================ */
function persist(){
  render();
  if (!firebaseReady) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try {
      await setDoc(CURRENT_REF(), {
        mode: state.mode,
        startTime: state.startTime,
        phase: state.phase,
        participants: state.participants,
        matches: state.matches,
        champion: state.champion,
        updatedAt: serverTimestamp()
      });
      lastSavedAt = new Date();
      updateSaveIndicator(true);
    } catch(e){
      console.error(e);
      updateSaveIndicator(false, true);
    }
  }, 350);
}

async function saveTournamentToHistory(){
  if (!firebaseReady) return;
  try {
    await addDoc(HISTORY_COL(), {
      mode: state.mode,
      phase: state.phase,
      participants: state.participants,
      matches: state.matches,
      champion: state.champion,
      startTime: state.startTime,
      savedAt: serverTimestamp()
    });
  } catch(e){ console.error(e); }
}

async function loadHistoryList(){
  if (!firebaseReady) return [];
  try {
    const q = query(HISTORY_COL(), orderBy("savedAt","desc"), limit(10));
    const snap = await getDocs(q);
    return snap.docs.map(d=>({id:d.id, ...d.data()}));
  } catch(e){ console.error(e); return []; }
}

async function deleteHistoryItem(id){
  if (!firebaseReady) return;
  try { await deleteDoc(doc(db,"tournaments_history", id)); } catch(e){ console.error(e); }
}

function loadHistoryIntoState(item){
  state.mode = item.mode || 32;
  state.startTime = item.startTime || "";
  state.phase = item.phase;
  state.participants = item.participants || [];
  state.matches = item.matches || [];
  state.champion = item.champion || null;
  persist();
  toast("大会を読み込みました");
  switchTab("home");
}

function updateSaveIndicator(ok, error){
  const el = document.getElementById("saveText");
  const dot = document.querySelector("#saveIndicator .dot");
  if (!firebaseReady) {
    el.textContent = "未接続(設定要)";
    dot.style.background = "#B0BEC5";
    return;
  }
  if (error) {
    el.textContent = "保存エラー";
    dot.style.background = "#FF5252";
    return;
  }
  if (ok && lastSavedAt) {
    const hh = String(lastSavedAt.getHours()).padStart(2,"0");
    const mm = String(lastSavedAt.getMinutes()).padStart(2,"0");
    const ss = String(lastSavedAt.getSeconds()).padStart(2,"0");
    el.textContent = `同期済 ${hh}:${mm}:${ss}`;
    dot.style.background = "#69F0AE";
  }
}

function subscribeRealtime(){
  if (!firebaseReady) { updateSaveIndicator(false); return; }
  unsubscribeCurrent = onSnapshot(CURRENT_REF(), (snap)=>{
    if (snap.exists()) {
      const d = snap.data();
      state.mode = d.mode ?? state.mode;
      state.startTime = d.startTime ?? state.startTime;
      state.phase = d.phase ?? state.phase;
      state.participants = d.participants ?? state.participants;
      state.matches = d.matches ?? state.matches;
      state.champion = d.champion ?? state.champion;
      lastSavedAt = new Date();
      updateSaveIndicator(true);
      render();
    }
  }, (err)=>{ console.error(err); updateSaveIndicator(false, true); });
}

/* ============================================================
   データ管理（エクスポート/インポート/クリア）
   ============================================================ */
async function exportData(){
  const history = await loadHistoryList();
  const payload = { current: state, history, exportTime: Date.now() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date();
  const fname = `OgawaEsports_${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,"0")}${String(ts.getDate()).padStart(2,"0")}_${String(ts.getHours()).padStart(2,"0")}${String(ts.getMinutes()).padStart(2,"0")}${String(ts.getSeconds()).padStart(2,"0")}.json`;
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
  toast("データをエクスポートしました");
}

function importData(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.current) {
        state.mode = data.current.mode ?? state.mode;
        state.startTime = data.current.startTime ?? state.startTime;
        state.phase = data.current.phase ?? state.phase;
        state.participants = data.current.participants ?? state.participants;
        state.matches = data.current.matches ?? state.matches;
        state.champion = data.current.champion ?? state.champion;
        persist();
      }
      toast("データをインポートしました");
    } catch(err){
      console.error(err);
      toast("インポートに失敗しました");
    }
  };
  reader.readAsText(file);
}

async function clearAllData(){
  if (firebaseReady) {
    try {
      const snap = await getDocs(HISTORY_COL());
      for (const d of snap.docs) await deleteDoc(d.ref);
    } catch(e){ console.error(e); }
  }
  startNewTournament();
  toast("すべてのデータを削除しました");
}

function switchTab(tab){

}

function phaseItemHtml(title, desc, roundType, winners){
  const matches = state.matches.filter(m=>m.roundType===roundType);
  const isActive = ROUND_FOR_PHASE[state.phase] === roundType;
  const isCompleted = matches.length>0 && matches.every(m=>m.status==="COMPLETED");
  const status = isActive ? '進行中' : (isCompleted ? '完了' : '待機中');
  const cls = isActive ? 'pill-active' : (isCompleted ? 'pill-done' : 'pill-wait');
  return `
    <div class="phase-item">
      <div class="row">
        <div>
          <div class="phase-title">${title}</div>
          <div class="phase-desc">${desc}</div>
        </div>
        <span class="pill ${cls}">${status}</span>
      </div>
      ${winners && winners.length ? `<div class="winners">通過: ${winners.join(", ")}</div>` : ''}
    </div>
  `;
}

function phaseCaption(){
  const mode = state.mode;
  const groupCount = mode/4;
  switch(state.phase){
    case "PRELIMINARY": return `${groupCount}試合（4人×${groupCount}）｜上位2名が勝者`;
    case "LOSERS_REVIVAL": {
      const c = state.matches.filter(m=>m.roundType==="LOSERS_REVIVAL").length;
      return `${c}試合｜上位2名が復活`;
    }
    case "MAIN_ROUND": {
      const c = state.matches.filter(m=>m.roundType==="MAIN_ROUND").length;
      return `${c}試合｜上位2名が通過`;
    }
    case "SEMI_FINAL": {
      const c = state.matches.filter(m=>m.roundType==="SEMI_FINAL").length;
      return `${c}試合｜上位2名が決勝進出`;
    }
    case "FINAL": return `決勝戦`;
    default: return "";
  }
}

function renderTournament(){
  const main = document.getElementById("main");
  const readyToAdvance = isPhaseReadyToAdvance() && state.phase !== "FINAL";
  const readyToFinish = isPhaseReadyToAdvance() && state.phase === "FINAL";
  main.innerHTML = `
    <div class="card">
      <div class="row"><h2 style="margin:0;">試合進行</h2><span class="pill pill-active">${PHASE_LABEL[state.phase]}</span></div>
      <div class="muted" style="margin-top:6px;">${phaseCaption()}</div>
      ${(readyToAdvance||readyToFinish) ? `<button class="btn btn-primary" id="advanceBtn" style="margin-top:12px;">${NEXT_STAGE_LABEL[state.phase]}</button>` : ''}
    </div>
    <div id="matchList"></div>
  `;
  const advBtn = document.getElementById("advanceBtn");
  if (advBtn) advBtn.onclick = () => { advanceToNextPhase(); render(); };
  const list = document.getElementById("matchList");
  if (state.matches.length === 0) {
    list.innerHTML = `<div class="empty">大会を開始すると試合が表示されます</div>`;
    return;
  }
  // 現在フェーズの試合を先頭に
  const roundType = ROUND_FOR_PHASE[state.phase];
  const sorted = [...state.matches].sort((a,b)=>{
    const aCur = a.roundType===roundType ? 0 : 1;
    const bCur = b.roundType===roundType ? 0 : 1;
    return aCur - bCur;
  });
  sorted.forEach(m => list.appendChild(renderMatchCard(m)));
}

function participantGridHtml(numbers){
  const cells = numbers.map(n=>{
    const nm = pname(n);
    return `<div class="ptag"><div class="ptag-num">${n}</div><div class="ptag-name">${nm||''}</div></div>`;
  }).join("");
  return `<div class="plist" style="grid-template-columns:repeat(${numbers.length},1fr);">${cells}</div>`;
}

function renderMatchCard(match){
  const card = el(`<div class="match-card"></div>`);
  card.innerHTML = `
    <div class="row">
      <span class="mid">${match.id}</span>
      <span class="status-badge status-${match.status}">${match.status==='PENDING'?'待機中':match.status==='IN_PROGRESS'?'進行中':'完了'}</span>
    </div>
    ${participantGridHtml(match.participants)}
  `;
  if (match.status === "PENDING") {
    const btn = el(`<button class="btn btn-primary" style="margin-top:10px;">試合開始</button>`);
    btn.onclick = () => startMatch(match.id);
    card.appendChild(btn);
  } else if (match.status === "IN_PROGRESS") {
    const btn = el(`<button class="btn btn-amber" style="margin-top:10px;">順位を入力</button>`);
    btn.onclick = () => openRankingModal(match);
    card.appendChild(btn);
  } else if (match.status === "COMPLETED") {
    const resultHtml = match.rankings.map((n,i)=>`${i+1}位: No.${n} ${pname(n)}`).join("<br>");
    card.appendChild(el(`<div class="ranking-result">${resultHtml}</div>`));
  }
  return card;
}

      modal.appendChild(div);
    });
    const remaining = match.participants.filter(n => !rankings.includes(n));
    if (remaining.length) {
      const divider = el(`<div class="muted" style="margin-top:10px;">未決定</div>`);
      modal.appendChild(divider);
    }
    remaining.forEach(n => {
      const div = el(`<div class="rank-choice"><span>No.${n} ${pname(n)}</span></div>`);
      div.onclick = () => { rankings = [...rankings, n]; draw(); };
      modal.appendChild(div);
    });
    if (rankings.length) {
      const resetBtn = el(`<button class="btn btn-ghost" style="margin-top:12px;">順位をリセット</button>`);
      resetBtn.onclick = () => { rankings = []; draw(); };
      modal.appendChild(resetBtn);
    }
    const confirmBtn = el(`<button class="btn btn-primary" style="margin-top:10px;">確定</button>`);
    confirmBtn.disabled = rankings.length !== match.participants.length;
    confirmBtn.onclick = () => {
      recordMatchResult(match.id, rankings);
      backdrop.remove();
      render();
    };
    modal.appendChild(confirmBtn);
    const cancelBtn = el(`<button class="btn btn-ghost" style="margin-top:8px;">キャンセル</button>`);
    cancelBtn.onclick = () => backdrop.remove();
    modal.appendChild(cancelBtn);
  }
  draw();
}

async function renderHistory(){
  const main = document.getElementById("main");
  main.innerHTML = `<div class="card"><h2 style="margin:0;">大会履歴</h2><div class="muted">最新10件を表示</div></div><div id="historyList" class="empty">読み込み中...</div>`;
  const list = await loadHistoryList();
  const box = document.getElementById("historyList");
  if (!list.length) { box.className="empty"; box.textContent = "履歴はまだありません"; return; }
  box.className = ""; box.innerHTML = "";
  list.forEach(item => {
    const date = item.savedAt && item.savedAt.toDate ? item.savedAt.toDate() : null;
    const dateStr = date ? `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}` : "";
    const card = el(`<div class="card"></div>`);
    card.innerHTML = `
      <div class="row"><span class="muted">📅 ${dateStr}</span><span class="pill ${item.phase==='CEREMONY'||item.phase==='COMPLETED'?'pill-done':'pill-active'}">${PHASE_LABEL[item.phase]||''}</span></div>
      <div style="margin-top:6px;font-weight:700;">${item.mode}人トーナメント</div>
      ${item.champion!=null ? `<div style="margin-top:4px;color:var(--red);">🏆 優勝: No.${item.champion} ${(item.participants||[]).find(p=>p.number===item.champion)?.name||''}</div>` : ''}
    `;
    const btnRow = el(`<div class="btn-row" style="margin-top:10px;"></div>`);
    const loadBtn = el(`<button class="btn btn-primary">この大会を読込</button>`);
    loadBtn.onclick = () => loadHistoryIntoState(item);
    const delBtn = el(`<button class="btn btn-danger" style="max-width:70px;">🗑</button>`);
    delBtn.onclick = async () => { if(confirm("この履歴を削除しますか？")){ await deleteHistoryItem(item.id); renderHistory(); } };
    btnRow.appendChild(loadBtn); btnRow.appendChild(delBtn);
    card.appendChild(btnRow);
    box.appendChild(card);
  });
}

function renderData(){
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="card">
      <h2 style="margin:0;">📤 エクスポート</h2>
      <div class="muted" style="margin:6px 0 12px;">現在の大会データと履歴をファイルに保存します。</div>
      <button class="btn btn-primary" id="exportBtn">データをエクスポート</button>
    </div>
    <div class="card">
      <h2 style="margin:0;">📥 インポート</h2>
      <div class="muted" style="margin:6px 0 12px;">以前にエクスポートしたファイルから現在の大会データを復元します。</div>
      <input type="file" id="importInput" accept="application/json">
    </div>
    <div class="card">
      <h2 style="margin:0;">🗑️ データクリア</h2>
      <div class="muted" style="margin:6px 0 12px;">すべてのデータ（現在の大会・履歴）を削除します。この操作は取り消せません。</div>
      <button class="btn btn-danger" id="clearAllBtn">すべてのデータを削除</button>
    </div>
    <div class="card">
      <h2 style="margin:0;">接続状態</h2>
      <div class="muted" style="margin-top:6px;">${firebaseReady ? "✅ Firebaseに接続しています。運営端末と大型画面はリアルタイムで同期されます。" : "⚠️ Firebase未設定です。index.html内のfirebaseConfigを自分のプロジェクトの値に置き換えてください。"}</div>
    </div>
  `;
  document.getElementById("exportBtn").onclick = exportData;
  document.getElementById("importInput").onchange = (e) => { const f=e.target.files[0]; if(f) importData(f); };
  document.getElementById("clearAllBtn").onclick = () => { if(confirm("すべてのデータを削除しますか？この操作は取り消せません。")) clearAllData(); };
}

/* ============================================================
   大型画面（表示専用モード）
   ============================================================ */
let dispPage = 0;
const DISP_PAGE_COUNT = 2;

function openDisplay(){
  const view = document.getElementById("displayView");
  view.classList.add("show");
  dispPage = 0;
  renderDisplay();
  // 可能であれば全画面化＋横画面ロックを試みる(対応ブラウザのみ。非対応時はCSSで擬似的に横画面表示する)
  try {
    if (view.requestFullscreen) {
      view.requestFullscreen().then(()=>{
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(()=>{});
        }
      }).catch(()=>{});
    }
  } catch(e) {}
}
function closeDisplay(){
  document.getElementById("displayView").classList.remove("show");
  try {
    if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
  } catch(e) {}
}
document.getElementById("dispClose").onclick = closeDisplay;
document.getElementById("dispTabs").addEventListener("click", (e)=>{
  const idx = Array.from(e.currentTarget.children).indexOf(e.target);
  if (idx >= 0) { dispPage = idx; renderDisplay(); }
});

// スワイプで「現在の試合」⇔「大会進行状況」を切り替え
let dispTouchStartX = null;
const dispBodyEl = document.getElementById("dispBody");
dispBodyEl.addEventListener("touchstart", (e)=>{
  dispTouchStartX = e.touches[0].clientX;
}, { passive:true });
dispBodyEl.addEventListener("touchend", (e)=>{
  if (dispTouchStartX === null) return;
  const dx = e.changedTouches[0].clientX - dispTouchStartX;
  dispTouchStartX = null;
  if (Math.abs(dx) < 50) return;
  if (dx < 0) dispPage = Math.min(DISP_PAGE_COUNT - 1, dispPage + 1);
  else dispPage = Math.max(0, dispPage - 1);
  renderDisplay();
}, { passive:true });

function renderDisplay(){
  const body = document.getElementById("dispBody");
  const dots = document.querySelectorAll("#dispTabs .d");
  dots.forEach((d,i)=>d.classList.toggle("on", i===dispPage));

  if (dispPage === 0) {
    const current = state.matches.filter(m=>m.status==="IN_PROGRESS");
    const next = state.matches.filter(m=>m.status==="PENDING").slice(0,2);
    const gf = state.matches.find(m=>m.roundType==="GRAND_FINAL"&&m.status==="COMPLETED");
    const topThree = gf ? gf.rankings.slice(0,3) : [];

    if (current.length > 0) {
      body.innerHTML = `<div style="font-size:20px;font-weight:800;color:var(--red);margin-bottom:10px;">現在の試合（${current.length}試合）</div>
        <div class="grid-match ${current.length>1?'two':''}"></div>`;
      const grid = body.querySelector(".grid-match");
      current.slice(0,2).forEach(m => {
        const c = el(`<div class="match-card"></div>`);
        c.innerHTML = `<div class="mid" style="font-size:18px;">${m.id}</div>${participantGridHtml(m.participants)}`;
        grid.appendChild(c);
      });
    } else if (state.champion !== null && topThree.length === 3) {
      body.innerHTML = `<div style="text-align:center;font-size:28px;font-weight:800;color:var(--red);">🏆 表彰台 🏆</div>`;
      const row = el(`<div class="podium-row"></div>`);
      const medals = ["🥇","🥈","🥉"];
      const order = [1,0,2]; // 2位,1位,3位の順で表示
      order.forEach(i => {
        const num = topThree[i];
        const div = el(`<div class="podium-card p${i+1}"><div class="medal">${medals[i]}</div><div style="font-weight:800;font-size:20px;">${pname(num)||('No.'+num)}</div><div class="muted">No.${num}</div></div>`);
        row.appendChild(div);
      });
      body.innerHTML = ""; 
      body.appendChild(el(`<div style="text-align:center;font-size:28px;font-weight:800;color:var(--red);">🏆 表彰台 🏆</div>`));
      body.appendChild(row);
    } else if (next.length > 0) {
      body.innerHTML = `<div style="font-size:20px;font-weight:800;color:var(--cyan);margin-bottom:10px;">次の対戦</div>`;
      next.forEach(m => {
        const c = el(`<div class="next-card" style="margin-bottom:10px;"></div>`);
        c.innerHTML = `<div style="font-weight:700;">${m.id}</div>${participantGridHtml(m.participants)}`;
        body.appendChild(c);
      });
    } else {
      body.innerHTML = `<div class="empty">大会開始をお待ちください</div>`;
    }
  } else {
    const total = state.matches.length;
    const completed = state.matches.filter(m=>m.status==="COMPLETED").length;
    const inProgress = state.matches.filter(m=>m.status==="IN_PROGRESS").length;
    const pending = state.matches.filter(m=>m.status==="PENDING").slice(0,8);
    body.innerHTML = `
      <div style="font-size:24px;font-weight:800;color:var(--blue);margin-bottom:12px;">大会進行状況</div>
      <div class="card">
        <div class="row"><span class="muted">現在のフェーズ</span><span style="font-weight:800;color:var(--red);">${PHASE_LABEL[state.phase]}</span></div>
        <div class="row"><span class="muted">試合進捗</span><span style="font-weight:800;">${completed} / ${total} 完了</span></div>
        ${inProgress>0?`<div class="row"><span class="muted">進行中</span><span style="font-weight:800;color:var(--blue);">${inProgress}試合</span></div>`:''}
      </div>
      <div style="font-size:20px;font-weight:800;color:var(--cyan);margin:16px 0 8px;">次の対戦予定</div>
      <div class="grid-match two"></div>
    `;
    const grid = body.querySelector(".grid-match");
    if (pending.length === 0) {
      grid.outerHTML = `<div class="empty">待機中の試合はありません</div>`;
    } else {
      pending.forEach(m=>{
        const c = el(`<div class="next-card"></div>`);
        c.innerHTML = `<div style="font-weight:700;color:var(--cyan);">${m.id}</div>${participantGridHtml(m.participants)}`;
        grid.appendChild(c);
      });
    }
  }
}

// state更新のたびに大型画面も更新
const _origRender = render;
render = function(){ _origRender(); if (document.getElementById("displayView").classList.contains("show")) renderDisplay(); };

/* ============================================================
   初期化
   ============================================================ */
document.querySelectorAll("nav.tabbar button").forEach(btn => {
  btn.addEventListener("click", () => switchTab(btn.dataset.tab));
});

subscribeRealtime();
render();
</script>
